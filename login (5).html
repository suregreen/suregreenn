<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — SureGreen</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080b0f;
  --card:#0f1620;
  --g:#22f075;
  --border:rgba(255,255,255,.07);
  --border-g:rgba(34,240,117,.2);
  --text:#f2f6f4;
  --text2:#6b8578;
  --font:'Inter',sans-serif;
}
html,body{height:100%}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

.bg-glow{
  position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 65% 60% at 50% 45%, rgba(34,240,117,.07) 0%, transparent 65%);
}
.bg-grid{
  position:fixed;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(34,240,117,.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,240,117,.022) 1px, transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse 75% 75% at 50% 50%, black 0%, transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse 75% 75% at 50% 50%, black 0%, transparent 75%);
}

.wrapper{
  position:relative;z-index:1;
  width:100%;max-width:400px;
  padding:1.5rem;
  animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.logo{
  display:flex;align-items:center;gap:.6rem;
  text-decoration:none;
  margin-bottom:2.5rem;
  justify-content:center;
}
.logo-box{
  width:38px;height:38px;
  background:#111c14;
  border:1px solid rgba(34,240,117,.25);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}
.logo-name{
  font-size:1.55rem;font-weight:800;
  letter-spacing:-.5px;color:var(--text);
}
.logo-name span{color:var(--g)}

.card{
  background:var(--card);
  border:1px solid rgba(34,240,117,.13);
  border-radius:22px;
  padding:2.5rem 2.25rem 2.25rem;
  box-shadow:
    0 0 0 1px rgba(34,240,117,.04),
    0 24px 70px rgba(0,0,0,.65),
    0 0 55px rgba(34,240,117,.05);
}

.card-title{
  font-size:1.65rem;font-weight:900;
  letter-spacing:-.8px;
  margin-bottom:1.8rem;
  line-height:1.15;
}
.card-title span{color:var(--g)}
.card-sub{
  font-size:.86rem;color:var(--text2);
  line-height:1.65;margin-bottom:2rem;
}

.error-msg{
  display:none;
  background:rgba(239,68,68,.07);
  border:1px solid rgba(239,68,68,.18);
  border-radius:10px;
  padding:.65rem .9rem;
  font-size:.81rem;color:#f87171;
  margin-bottom:1.1rem;
  align-items:center;gap:.45rem;
}
.error-msg.show{display:flex}

.form-group{margin-bottom:1rem}
label{
  display:block;
  font-size:.78rem;font-weight:600;
  color:rgba(242,246,244,.5);
  margin-bottom:.45rem;letter-spacing:.2px;
  text-transform:uppercase;
}
.input-wrap{position:relative}
.input-icon{
  position:absolute;left:.95rem;top:50%;transform:translateY(-50%);
  color:rgba(107,133,120,.6);pointer-events:none;
  transition:color .2s;
}
input[type=email],
input[type=password]{
  width:100%;
  background:rgba(8,11,15,.8);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;
  color:var(--text);
  font-family:var(--font);font-size:.92rem;font-weight:400;
  padding:.82rem 1rem .82rem 2.65rem;
  outline:none;
  transition:border-color .2s, box-shadow .2s;
  -webkit-appearance:none;
}
input::placeholder{color:rgba(107,133,120,.55);font-size:.88rem}
input:focus{
  border-color:rgba(34,240,117,.38);
  box-shadow:0 0 0 3px rgba(34,240,117,.07);
}

.pw-wrap{position:relative}
.pw-toggle{
  position:absolute;right:.9rem;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:rgba(107,133,120,.6);padding:.2rem;
  transition:color .2s;display:flex;
}
.pw-toggle:hover{color:var(--text2)}

.forgot-row{display:flex;justify-content:flex-end;margin-top:.55rem}
.forgot{
  font-size:.79rem;color:var(--text2);
  text-decoration:none;font-weight:500;
  transition:color .2s;
}
.forgot:hover{color:var(--g)}

.btn-submit{
  width:100%;margin-top:1.6rem;
  background:var(--g);color:#020d05;
  border:none;padding:.9rem;border-radius:999px;
  font-family:var(--font);font-size:.95rem;font-weight:800;
  cursor:pointer;letter-spacing:.1px;
  transition:all .22s;
  box-shadow:0 4px 22px rgba(34,240,117,.28);
  display:flex;align-items:center;justify-content:center;gap:.5rem;
}
.btn-submit:hover{
  background:#3dffa0;
  box-shadow:0 6px 30px rgba(34,240,117,.5);
  transform:translateY(-1px);
}
.btn-submit:active{transform:translateY(0)}
.btn-submit.loading{opacity:.75;pointer-events:none}
.spinner{
  display:none;width:16px;height:16px;
  border:2.5px solid rgba(2,13,5,.25);
  border-top-color:#020d05;
  border-radius:50%;
  animation:spin .65s linear infinite;
}
.btn-submit.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

.divider{
  display:flex;align-items:center;gap:.75rem;
  margin:1.5rem 0 1.25rem;
  color:rgba(107,133,120,.45);font-size:.76rem;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:rgba(255,255,255,.06);
}

.register-row{
  text-align:center;font-size:.84rem;color:var(--text2);
}
.register-row a{
  color:var(--g);font-weight:700;text-decoration:none;
  transition:color .2s;
}
.register-row a:hover{color:#3dffa0}

.back{
  display:flex;align-items:center;justify-content:center;
  gap:.3rem;margin-top:1.5rem;
  font-size:.8rem;color:rgba(107,133,120,.5);
  text-decoration:none;transition:color .2s;
}
.back:hover{color:var(--text2)}

@media(max-width:440px){
  .card{padding:2rem 1.3rem 1.8rem}
  .wrapper{padding:1rem}
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<div class="wrapper">

  <a href="/" class="logo">
    <div class="logo-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#22f075" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    <span class="logo-name">Sure<span>Green</span></span>
  </a>

  <div class="card">
    <h1 class="card-title">Bem-vindo de <span>volta</span></h1>


    <div class="error-msg" id="errorMsg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>E-mail ou senha incorretos.</span>
    </div>

    <form id="loginForm" novalidate>

      <div class="form-group">
        <label for="email">E-mail</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required>
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="input-wrap pw-wrap">
          <input type="password" id="password" placeholder="Sua senha" autocomplete="current-password" required>
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <button type="button" class="pw-toggle" onclick="togglePw()" aria-label="Mostrar senha">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="forgot-row">
          <a href="/esqueci-senha" class="forgot">Esqueci minha senha</a>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span id="btnText">Entrar na minha conta</span>
        <div class="spinner"></div>
      </button>

    </form>


  </div>

  <a href="/" class="back">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Voltar ao site
  </a>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAwVfYGWzkJ74FaWpeF2LQhRTMlCEyJdFw",
  authDomain: "xuxa-bet.firebaseapp.com",
  projectId: "xuxa-bet",
  storageBucket: "xuxa-bet.firebasestorage.app",
  messagingSenderId: "825878560179",
  appId: "1:825878560179:web:9f838f06dc4c2894111fc6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function togglePw(){
  const pw = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if(pw.type === 'password'){
    pw.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    pw.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
window.togglePw = togglePw;

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');
  const txt = document.getElementById('btnText');

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  err.classList.remove('show');
  btn.classList.add('loading');
  txt.textContent = 'Entrando...';

  try {
    await signInWithEmailAndPassword(auth, email, password);
    // ✅ Login bem sucedido — redirecione para seu dashboard
    window.location.href = '/dashboard';
  } catch (error) {
    btn.classList.remove('loading');
    txt.textContent = 'Entrar na minha conta';

    const errText = document.getElementById('errorMsg');
    errText.querySelector('span') 
      ? errText.querySelector('span').textContent = traduzirErro(error.code)
      : errText.childNodes[1] && (errText.childNodes[1].textContent = traduzirErro(error.code));
    err.classList.add('show');
    err.lastChild.textContent = traduzirErro(error.code);
  }
});

function traduzirErro(code){
  const erros = {
    'auth/user-not-found': 'Nenhuma conta encontrada com esse e-mail.',
    'auth/wrong-password': 'Senha incorreta. Tente novamente.',
    'auth/invalid-email': 'E-mail inválido.',
    'auth/too-many-requests': 'Muitas tentativas. Tente novamente mais tarde.',
    'auth/invalid-credential': 'E-mail ou senha incorretos.',
  };
  return erros[code] || 'Erro ao entrar. Tente novamente.';
}
</script>
</body>
</html>
